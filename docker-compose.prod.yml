# Production override - use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports: []

  redis:
    restart: always
    ports: []

  clamav:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  rspamd:
    restart: always
    # Alle Ports nur intern - rspamd WebUI via Nginx /rspamd/
    # Federation-Ports nur oeffnen wenn Peers konfiguriert:
    #   ./scripts/deploy.sh federation-add <peer-ip>
    ports: []

  postfix:
    restart: always

  mail-service:
    restart: always

  web:
    restart: always
    ports:
      - "127.0.0.1:${WEB_PORT:-3177}:3000"
