# Production override - use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports: []

  redis:
    restart: always
    ports: []

  clamav:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  rspamd:
    restart: always
    ports:
      # Port 11333: Scanner engine for remote clients (federation/scanner-clients)
      # Firewall restricts access to known client IPs:
      #   ./scripts/deploy.sh federation-add <client-ip> "name"
      - "11333:11333"

  postfix:
    restart: always

  mail-service:
    restart: always

  web:
    restart: always
    ports:
      - "${WEB_PORT:-3177}:3000"
