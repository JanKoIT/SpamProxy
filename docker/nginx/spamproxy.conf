# SpamProxy Nginx Reverse Proxy
# TLS wird automatisch von Certbot hinzugefuegt

server {
    listen 80;
    server_name spamproxy.example.com;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Web Interface
    location / {
        proxy_pass http://127.0.0.1:3177;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Federation API (fuer Remote-Peers, IP-Whitelist)
    location /federation/ {
        # === PEER IPS HIER EINTRAGEN ===
        # allow 1.2.3.4;     # Peer: server-name
        deny all;

        rewrite ^/federation/(.*)$ /api/federation/$1 break;
        proxy_pass http://127.0.0.1:3177;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
