# SpamProxy Nginx Reverse Proxy mit TLS
# Installiere mit: sudo cp docker/nginx/spamproxy.conf /etc/nginx/sites-available/spamproxy
#                  sudo ln -s /etc/nginx/sites-available/spamproxy /etc/nginx/sites-enabled/
#                  sudo certbot --nginx -d spamproxy.example.com

# Rate-Limiting Zonen (muessen ausserhalb server{} stehen)
limit_req_zone $binary_remote_addr zone=web:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=federation:10m rate=5r/s;

server {
    listen 80;
    server_name spamproxy.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name spamproxy.example.com;

    # TLS - wird von certbot automatisch befuellt
    # ssl_certificate /etc/letsencrypt/live/spamproxy.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/spamproxy.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Web Interface ---
    location / {
        limit_req zone=web burst=20 nodelay;
        proxy_pass http://127.0.0.1:3177;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Federation API (fuer Remote-Peers) ---
    # Erlaubt Remote-Servern, Learn-Requests und Stats abzufragen
    # IP-Whitelist: Nur bekannte Peer-IPs erlauben
    # Fuege pro Peer eine Zeile hinzu: allow <peer-ip>;
    location /federation/ {
        limit_req zone=federation burst=10 nodelay;

        # === PEER IPS HIER EINTRAGEN ===
        # allow 1.2.3.4;     # Peer: server-name
        # allow 5.6.7.8;     # Peer: other-server
        deny all;

        # Proxy zum mail-service Federation-API
        rewrite ^/federation/(.*)$ /api/federation/$1 break;
        proxy_pass http://127.0.0.1:8025;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- rspamd WebUI (nur fuer Admins) ---
    location /rspamd/ {
        # Optional: IP-Beschraenkung
        # allow 10.0.0.0/8;
        # deny all;

        rewrite ^/rspamd/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:11334;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
