# DNS Blocklists (RBL/DNSBL)
# Managed via web interface settings

rbls {
    # Spamhaus ZEN (free tier - IP-based)
    spamhaus_zen {
        symbol = "RBL_SPAMHAUS_ZEN";
        rbl = "zen.spamhaus.org";
        ipv4 = true;
        ipv6 = true;
        returncodes {
            RBL_SPAMHAUS_SBL = "127.0.0.2";
            RBL_SPAMHAUS_CSS = "127.0.0.3";
            RBL_SPAMHAUS_XBL = "127.0.0.4";
            RBL_SPAMHAUS_XBL2 = "127.0.0.5";
            RBL_SPAMHAUS_XBL3 = "127.0.0.6";
            RBL_SPAMHAUS_XBL4 = "127.0.0.7";
            RBL_SPAMHAUS_PBL = "127.0.0.10";
            RBL_SPAMHAUS_PBL2 = "127.0.0.11";
        }
    }

    # Spamhaus DBL (domain-based)
    spamhaus_dbl {
        symbol = "RBL_SPAMHAUS_DBL";
        rbl = "dbl.spamhaus.org";
        no_ip = true;
        dkim = true;
        emails = true;
        urls = true;
        returncodes {
            RBL_SPAMHAUS_DBL_SPAM = "127.0.1.2";
            RBL_SPAMHAUS_DBL_PHISH = "127.0.1.4";
            RBL_SPAMHAUS_DBL_MALWARE = "127.0.1.5";
            RBL_SPAMHAUS_DBL_BOTNET = "127.0.1.6";
            RBL_SPAMHAUS_DBL_ABUSE = "127.0.1.102";
            RBL_SPAMHAUS_DBL_ABUSE2 = "127.0.1.103";
            RBL_SPAMHAUS_DBL_ABUSE3 = "127.0.1.104";
        }
    }

    # Barracuda RBL
    barracuda {
        symbol = "RBL_BARRACUDA";
        rbl = "b.barracudacentral.org";
        ipv4 = true;
        ipv6 = false;
    }

    # SpamCop
    spamcop {
        symbol = "RBL_SPAMCOP";
        rbl = "bl.spamcop.net";
        ipv4 = true;
        ipv6 = false;
    }

    # SORBS
    sorbs {
        symbol = "RBL_SORBS";
        rbl = "dnsbl.sorbs.net";
        ipv4 = true;
        ipv6 = false;
    }

    # Abuseat CBL
    abuseat {
        symbol = "RBL_ABUSEAT";
        rbl = "cbl.abuseat.org";
        ipv4 = true;
        ipv6 = false;
    }
}
