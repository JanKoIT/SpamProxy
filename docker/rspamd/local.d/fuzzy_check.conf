# Fuzzy hash checking - local storage + optional remote peers
# Remote peers can be added via web interface (federation settings)

rule "local" {
    algorithm = "mumhash";
    servers = "127.0.0.1:11335";
    symbol = "LOCAL_FUZZY_UNKNOWN";
    mime_types = ["*"];
    max_score = 20.0;
    read_only = no;
    skip_unknown = yes;
    fuzzy_map = {
        LOCAL_FUZZY_DENIED {
            max_score = 20.0;
            flag = 1;
        }
        LOCAL_FUZZY_PROB {
            max_score = 10.0;
            flag = 2;
        }
        LOCAL_FUZZY_WHITE {
            max_score = 2.0;
            flag = 3;
        }
    }
}
