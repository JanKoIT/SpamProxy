# DKIM Signing for outgoing mail
enabled = true;

# Path to DKIM keys (managed via web interface)
path = "/var/lib/rspamd/dkim/$domain.$selector.key";
selector = "spamproxy";

# Sign when authenticated (outgoing)
sign_authenticated = true;
sign_local = true;
sign_networks = "172.16.0.0/12";

# Use domain from envelope sender
use_domain = "envelope";
use_esld = false;
allow_username_mismatch = true;

# Key type
key_type = "rsa";
