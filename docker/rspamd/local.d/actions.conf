# rspamd soll NICHT selbst ablehnen - nur Header setzen.
# Die Entscheidung (deliver/quarantine/reject) trifft der Content Filter.
reject = 9999;
# IMMER Header hinzufuegen (auch bei Score 0), damit der Content Filter
# den Score auslesen kann. Ohne diese Header zeigt das Mail Log Score 0.
add_header = -1;
greylist = null;
