# Write spam headers for EVERY mail regardless of action, so the
# content filter can always read the rspamd score and symbols.
# Without this, headers are only added when action = "add header" or higher.

use = ["x-spamd-result", "x-rspamd-server", "x-rspamd-queue-id"];
extended_spam_headers = true;
authenticated_headers = ["x-spamd-result", "x-rspamd-server", "x-rspamd-queue-id"];
local_headers = ["x-spamd-result", "x-rspamd-server", "x-rspamd-queue-id"];
